name: CI

on:
  push:
    branches:
      - main
      - 'feature/*'
  pull_request:
    branches:
      - main
      - 'feature/*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  flutter-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-cache-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            pub-cache-

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.44.2'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --set-exit-if-changed lib test integration_test tool

      - name: Analyze project source
        run: flutter analyze

      - name: Run tests
        run: flutter test

  integration-tests:
    runs-on: ubuntu-latest
    needs: flutter-ci
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-cache-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            pub-cache-

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.44.2'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Install xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Run integration tests
        run: |
          # Run each integration test file sequentially to avoid concurrent
          # Xcode / Gradle builds and simulator contention.
          exit_code=0
          for f in integration_test/*_test.dart; do
            echo "Running $f"
            xvfb-run -a flutter test "$f" || exit_code=$?
          done
          exit $exit_code

  build-apk-debug:
    runs-on: ubuntu-latest
    needs: flutter-ci
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-cache-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            pub-cache-

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/android/build.gradle', '**/android/app/build.gradle', '**/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.44.2'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk

  build-ios-debug:
    runs-on: macos-latest
    needs: flutter-ci
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-cache-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            pub-cache-

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.44.2'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS debug (no codesign)
        run: flutter build ios --no-codesign

      # iOS Simulator integration tests require a booted device and are run
      # manually during development. CI builds verify compilation only.

      - name: Upload iOS build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-logs
          path: build/ios/
