name: youtrade
description: "YouTrade — multi-venue Flutter trading terminal."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Networking
  http: ^1.3.0
  web_socket_channel: ^3.0.2

  # Charts
  candlesticks: ^3.0.1
  fl_chart: ^0.70.2

  # Local persistence
  drift: ^2.26.0
  sqlite3_flutter_libs: ^0.5.34
  path: ^1.9.1
  path_provider: ^2.1.5

  # Security / platform
  crypto: ^3.0.6
  local_auth: ^2.3.0
  local_auth_android: ^1.0.46
  local_auth_darwin: ^1.4.3
  flutter_secure_storage: ^9.2.4

  # Routing
  go_router: ^14.8.1

  # Code generation runtime
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # iOS-style icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  build_runner: ^2.4.15
  freezed: ^3.0.0
  json_serializable: ^6.9.4
  drift_dev: ^2.26.0
  riverpod_generator: ^2.6.5
  mocktail: ^1.0.4
  flutter_lints: ^6.0.0
  stream_channel: ^2.1.4
  async: ^2.13.1

flutter:
  uses-material-design: true
