name: youtrade
description: "YouTrade — multi-venue Flutter trading terminal."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2
  flutter: ^3.44.2

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod: ^2.6.1

  # Networking
  http: ^1.3.0
  web_socket_channel: ^3.0.2

  # Charts
  candlesticks: ^3.0.1
  fl_chart: ^0.70.2

  # Local persistence
  drift: ^2.26.0
  sqlite3_flutter_libs: ^0.5.34
  path: ^1.9.1
  path_provider: ^2.1.5
  shared_preferences: ^2.3.3

  # Security / platform
  crypto: ^3.0.6
  local_auth: ^2.3.0
  local_auth_android: ^1.0.46
  local_auth_darwin: ^1.4.3
  flutter_secure_storage: ^9.2.4
  pointycastle: ^3.9.1

  # Routing
  go_router: ^14.8.1

  # Environment / secrets
  flutter_dotenv: ^5.2.1

  # iOS-style icons
  cupertino_icons: ^1.0.8
  connectivity_plus: ^7.1.1
dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  build_runner: ^2.4.15
  drift_dev: ^2.26.0
  mocktail: ^1.0.4
  flutter_lints: ^6.0.0
  stream_channel: ^2.1.4
  async: ^2.13.1
  shared_preferences_platform_interface: ^2.4.0

flutter:
  uses-material-design: true

  assets:
    - assets/fonts/
    - .env.example

  fonts:
    - family: Geist
      fonts:
        - asset: assets/fonts/Geist.ttf
    - family: Space Grotesk
      fonts:
        - asset: assets/fonts/SpaceGrotesk.ttf
    - family: JetBrains Mono
      fonts:
        - asset: assets/fonts/JetBrainsMono.ttf
    - family: Instrument Serif
      fonts:
        - asset: assets/fonts/InstrumentSerif-Regular.ttf
        - asset: assets/fonts/InstrumentSerif-Italic.ttf
          style: italic
